# templates/docker-build-and-push.yml
# Template universel pour builder, scanner et pousser une image Docker.
# 100% Bash, agnostique du fournisseur de cloud.
parameters:
  - name: workingDir
    type: string
  - name: registryServer
    type: string
  - name: registryUsername
    type: string
  - name: registryPassword
    type: string
    default: ''
  - name: registryPasswordVar
    type: string
    default: ''
  - name: repository
    type: string
  - name: imageTag
    type: string
  - name: trivyVersion
    type: string
    default: '0.69.3'
  - name: enableRemoteCache
    type: string
    default: 'false'

steps:
  - bash: |
      set -euo pipefail
      echo "--- Préparation d'un environnement Docker isolé ---"
      mkdir -p $(Agent.TempDirectory)/.docker

      echo "--- Diagnostic des variables (Sécurisé) ---"
      echo "1. REGISTRY_USER attendu ('AWS') : '${REGISTRY_USER:-}'"
      echo "2. PASSWORD_VAR_NAME attendu ('SECURE_ECR_TOKEN') : '${PASSWORD_VAR_NAME:-}'"
      
      if [ -n "${SECURE_ECR_TOKEN:-}" ]; then 
        echo "3. SECURE_ECR_TOKEN : [✅ PRÉSENT EN MÉMOIRE]"
      else 
        echo "3. SECURE_ECR_TOKEN : [❌ VIDE OU NON TRANSMIS]"
      fi

      echo "--- Authentification sur le registre : $REGISTRY_SERVER ---"
      PASSWORD_TO_USE="${MAPPED_PASSWORD:-}"
      
      if [ -z "$PASSWORD_TO_USE" ] && [ "${PASSWORD_VAR_NAME:-}" = "SECURE_ECR_TOKEN" ]; then
        PASSWORD_TO_USE="${SECURE_ECR_TOKEN:-}"
      fi

      if [ -z "${REGISTRY_USER:-}" ] || [ -z "$PASSWORD_TO_USE" ]; then
        echo "##[error] Identifiants registry manquants (user/password). Impossible de pousser l'image."
        exit 1
      fi

      echo "Login en tant que '$REGISTRY_USER' sur '$REGISTRY_SERVER' (DOCKER_CONFIG isolé)."
      echo "$PASSWORD_TO_USE" | docker login "$REGISTRY_SERVER" -u "$REGISTRY_USER" --password-stdin

      echo "--- Vérification DOCKER_CONFIG (sans secrets) ---"
      if [ -f "$(Agent.TempDirectory)/.docker/config.json" ]; then
        cat "$(Agent.TempDirectory)/.docker/config.json" | sed 's/"auth"\s*:\s*"[^"]*"/"auth":"***"/g'
      else
        echo "##[error] config.json absent dans DOCKER_CONFIG : l'auth docker n'a pas été persistée."
        exit 1
      fi
    displayName: 'Login to Container Registry'
    env:
      DOCKER_CONFIG: $(Agent.TempDirectory)/.docker
      REGISTRY_SERVER: ${{ parameters.registryServer }}
      REGISTRY_USER: ${{ parameters.registryUsername }}
      MAPPED_PASSWORD: ${{ parameters.registryPassword }}
      PASSWORD_VAR_NAME: ${{ parameters.registryPasswordVar }}
      SECURE_ECR_TOKEN: $(SECURE_ECR_TOKEN)

  - bash: |
      set -euo pipefail

      echo "--- Diagnostic Docker (non sensible) ---"
      docker version
      docker info | sed -n '1,120p'

      echo "--- Initialisation du moteur Docker Buildx ---"
      BUILDER_NAME="cloudflow"

      # Évite les collisions / builders orphelins entre runs
      docker buildx rm -f "$BUILDER_NAME" >/dev/null 2>&1 || true

      docker buildx create --name "$BUILDER_NAME" --use --driver docker-container
      docker buildx inspect --bootstrap
      docker buildx ls

      echo "--- Lancement du Build & Push avec Remote Caching ---"

      CACHE_ARGS=""
      if [ "${{ parameters.enableRemoteCache }}" = "true" ]; then
        echo "Remote cache activé : tentative d'accès au manifest ${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache"
        docker pull "${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache" >/dev/null 2>&1 || true
        CACHE_ARGS="--cache-from=type=registry,ref=${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache,oci-mediatypes=true --cache-to=type=registry,ref=${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache,mode=max,oci-mediatypes=true"
      else
        echo "Remote cache désactivé (enableRemoteCache=false)."
      fi

      docker buildx build \
        --progress=plain \
        --platform linux/amd64 \
        --push \
        --secret id=TOKEN,env=TOKEN \
        $CACHE_ARGS \
        -t "${{ parameters.registryServer }}/${{ parameters.repository }}:${{ parameters.imageTag }}" \
        -f "${{ parameters.workingDir }}/Dockerfile" \
        "${{ parameters.workingDir }}"
    displayName: 'Build & Push with BuildKit Remote Cache'
    env:
      TOKEN: $(SECRET_TOKEN)
      DOCKER_CONFIG: $(Agent.TempDirectory)/.docker

  - bash: |
      set -e
      echo "--- Installation de Trivy v${{ parameters.trivyVersion }} ---"
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $(Agent.TempDirectory) v${{ parameters.trivyVersion }}
      TRIVY_BIN=$(Agent.TempDirectory)/trivy

      # On s'assure que Trivy utilise le même mot de passe que le Login (statique ou dynamique AWS)
      TRIVY_PWD="${MAPPED_PASSWORD:-}"
      if [ -z "$TRIVY_PWD" ] && [ -n "${SECURE_ECR_TOKEN:-}" ]; then
        TRIVY_PWD="${SECURE_ECR_TOKEN:-}"
      fi
      export TRIVY_PASSWORD="$TRIVY_PWD"

      echo "--- Scan de l'image poussée : ${{ parameters.registryServer }}/${{ parameters.repository }}:${{ parameters.imageTag }} ---"
      $TRIVY_BIN image \
        --severity CRITICAL,HIGH \
        --exit-code 1 \
        --ignore-unfixed \
        "${{ parameters.registryServer }}/${{ parameters.repository }}:${{ parameters.imageTag }}"
    displayName: 'Security Scan: Image Vulnerabilities'
    env:
      TRIVY_USERNAME: ${{ parameters.registryUsername }}
      MAPPED_PASSWORD: ${{ parameters.registryPassword }}
      SECURE_ECR_TOKEN: $(SECURE_ECR_TOKEN)

  - bash: |
      echo "--- Déconnexion du registre : ${{ parameters.registryServer }} ---"
      docker logout "${{ parameters.registryServer }}"
    displayName: 'Logout from Container Registry'
    condition: always()