# ---------------------------------------------------------------------------
# Template : Tests d'Intégration (H2 In-Memory)
# Objectif : Valider les interactions de bout-en-bout avec une base H2
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
  - name: mavenCacheFolder
    type: string
    default: $(Pipeline.Workspace)/.m2/repository

steps:
  - bash: |
      set -euo pipefail
      echo "--- Lancement des Tests d'Intégration (H2) ---"
      cd "${{ parameters.workingDir }}"

      # -Dsurefire.skip=true : On saute les tests unitaires (déjà faits)
      ./mvnw -B -ntp verify \
        -Dsurefire.skip=true \
        -Dspring.profiles.active=test \
        -Dmaven.repo.local=${{ parameters.mavenCacheFolder }}
    displayName: 'Run Integration Tests (H2)'

  - task: PublishTestResults@2
    displayName: 'Publish IT Results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/target/failsafe-reports/TEST-*.xml'
      searchFolder: '${{ parameters.workingDir }}'
      failTaskOnFailedTests: true
    condition: always()
    continueOnError: true # NOUVEAU: Empêche l'avertissement jaune si tu n'as pas de tests IT

  # Sauvegarde multi-modules (Au cas où tu ajoutes des tests IT avec couverture plus tard)
  - task: CopyFiles@2
    displayName: 'Prepare JaCoCo IT files for Artifact'
    inputs:
      SourceFolder: '${{ parameters.workingDir }}'
      Contents: '**/target/site/jacoco-it/jacoco.xml'
      TargetFolder: '$(Build.ArtifactStagingDirectory)/jacoco-it'
    condition: eq(variables['ITCoverageFlags.hasItCoverage'], 'true')

  - publish: '$(Build.ArtifactStagingDirectory)/jacoco-it'
    artifact: 'jacoco-it'
    displayName: 'Publish IT Coverage Artifact'
    condition: eq(variables['ITCoverageFlags.hasItCoverage'], 'true')
    continueOnError: true