# ---------------------------------------------------------------------------
# Template : Quality Check (Linting & Static Analysis)
# Objectif : Vérifier le style et les règles de codage AVANT la compilation
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
    default: ''
  - name: mavenCacheFolder
    type: string
    default: $(Pipeline.Workspace)/.m2/repository

steps:
  # Spotless Check (Vérification Formatage)
  - script: |
      set -euo pipefail
      echo "--- Lancement de Spotless Check ---"
      cd ${{ parameters.workingDir }}
      if ./mvnw help:describe -Dplugin=com.diffplug.spotless:spotless-maven-plugin > /dev/null 2>&1; then
          ./mvnw spotless:check -Dmaven.repo.local=${{ parameters.mavenCacheFolder }} || {
          echo "======================================================="
          echo "ÉCHEC DU FORMATAGE DE CODE"
          echo "-------------------------------------------------------"
          echo "Le code ne respecte pas les standards de formatage (Google Java Format)."
          echo ""
          echo "SOLUTION RAPIDE :"
          echo "1. Lance cette commande sur ton poste local :"
          echo "   ./mvnw spotless:apply"
          echo "2. Commit les changements générés."
          echo "3. Push à nouveau ton code."
          echo "======================================================="
      
          echo "##vso[task.logissue type=error]Formatage incorrect. Lancez './mvnw spotless:apply' en local."
          exit 1
        }
      
        echo "Formatage impeccable."
      else
          echo "Plugin Spotless non trouvé dans le pom.xml. Étape ignorée."
      fi
    displayName: 'Check Code Formatting (Spotless)'
    continueOnError: false

  # Checkstyle (Règles de codage)
  - script: |
      set -euo pipefail
      echo "--- Lancement de Checkstyle (Google Standards) ---"
      cd ${{ parameters.workingDir }}
      
      ./mvnw checkstyle:check -Dmaven.repo.local=${{ parameters.mavenCacheFolder }} || {
        echo "======================================================="
        echo "VIOLATION DES STANDARDS DE CODAGE"
        echo "-------------------------------------------------------"
        echo "Le code ne respecte pas les règles définies (Google Checks)."
        echo "Les erreurs précises sont listées ci-dessus"
        echo ""
        echo "SOLUTION :"
        echo "1. Regarde les logs ci-dessus pour identifier les lignes en erreur."
        echo "2. Corrige les problèmes (nommage, complexité, javadoc missing...)."
        echo "3. Vérifie en local avec : ./mvnw checkstyle:check"
        echo "======================================================="
      
        echo "##vso[task.logissue type=error]Standards de code non respectés. Voir les logs."
      
        exit 1
      }
      
      echo "Code conforme aux standards Google."
    displayName: 'Check Coding Standards (Checkstyle)'
    continueOnError: false