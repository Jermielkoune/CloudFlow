# templates/docker-build-to-azure.yml
# Wrapper pour Azure. Appelle le template universel avec les identifiants statiques.
parameters:
  - name: workingDir
    type: string
  - name: registryServer
    type: string
  - name: registryUsername
    type: string
  - name: registryPassword
    type: string
  - name: repository
    type: string
  - name: imageTag
    type: string

steps:
  - template: docker-build-and-push.yml
    parameters:
      workingDir: ${{ parameters.workingDir }}
      registryServer: ${{ parameters.registryServer }}
      registryUsername: ${{ parameters.registryUsername }}
      registryPassword: ${{ parameters.registryPassword }}
      repository: ${{ parameters.repository }}
      imageTag: ${{ parameters.imageTag }}
