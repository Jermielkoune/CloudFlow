# ---------------------------------------------------------------------------
# Template : Build & Containerization
# Objectif : Générer le binaire, builder l'image Docker
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
  - name: registryServer
    type: string
  - name: repository
    type: string
  - name: awsRegion
    type: string
  - name: imageTag
    type: string
    default: '$(Build.BuildId)'

steps:
  - bash: |
      set -euo pipefail
      echo "--- AWS identité (sts) + sanity check ECR ---"
      aws --version
      aws sts get-caller-identity

      echo "--- Vérification accès ECR au repo '${{ parameters.repository }}' (region=${{ parameters.awsRegion }}) ---"
      aws ecr describe-repositories --region "${{ parameters.awsRegion }}" --repository-names "${{ parameters.repository }}" >/dev/null
      echo "OK: le repo ECR est accessible."
    displayName: 'AWS IAM/ECR Preflight'
    condition: eq(variables['CLOUD_PROVIDER'], 'AWS')
    env:
      AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
      AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
      AWS_REGION: ${{ parameters.awsRegion }}
      AWS_DEFAULT_REGION: ${{ parameters.awsRegion }}

  - bash: |
      set -euo pipefail
      echo "--- AWS ECR: génération du token ---"
      ECR_TOKEN=$(aws ecr get-login-password --region "${{ parameters.awsRegion }}")

      if [ -z "$ECR_TOKEN" ]; then
        echo "##[error] Échec de la récupération du token AWS ECR."
        exit 1
      fi

      echo "##vso[task.setvariable variable=SECURE_ECR_TOKEN;issecret=true]$ECR_TOKEN"
    displayName: 'AWS ECR Token'
    condition: eq(variables['CLOUD_PROVIDER'], 'AWS')
    env:
      AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
      AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
      AWS_REGION: ${{ parameters.awsRegion }}
      AWS_DEFAULT_REGION: ${{ parameters.awsRegion }}

  - template: docker-build-and-push.yml
    parameters:
      condition: eq(variables['CLOUD_PROVIDER'], 'AWS')
      workingDir: ${{ parameters.workingDir }}
      registryServer: ${{ parameters.registryServer }}
      registryUsername: 'AWS'
      registryPasswordVar: 'SECURE_ECR_TOKEN'
      repository: ${{ parameters.repository }}
      imageTag: ${{ parameters.imageTag }}
