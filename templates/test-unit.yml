# ---------------------------------------------------------------------------
# Template : Tests Unitaires & Couverture
# Objectif : Valider la logique métier et générer les rapports pour Azure/Sonar
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
  - name: mavenCacheFolder
    type: string
    default: $(Pipeline.Workspace)/.m2/repository

steps:
  - bash: |
      set -euo pipefail
      echo "--- Lancement des Tests Unitaires (JUnit 6) ---"
      cd ${{ parameters.workingDir }}
      ./mvnw -B -ntp clean test jacoco:report \
      -Dmaven.repo.local=${{ parameters.mavenCacheFolder }} \
      -Dmaven.test.failure.ignore=true

      echo "--- Vérification des rapports ---"
      # Recherche dynamique des fichiers jacoco.xml dans les sous-modules
      REPORT_COUNT=$(find . -name "jacoco.xml" -type f | wc -l)

      if [ "$REPORT_COUNT" -eq 0 ]; then
        echo "======================================================="
        echo "INFORMATION CLOUDFLOW : AUCUN TEST DÉTECTÉ"
        echo "-------------------------------------------------------"
        echo "Le dossier de couverture JaCoCo n'a pas été généré."
        echo "======================================================="
        echo "##vso[task.logissue type=warning]Aucun test unitaire n'a généré de rapport de couverture."
      else
        echo "Rapports JaCoCo générés avec succès ($REPORT_COUNT trouvés) !"
      fi
    displayName: 'Run Junit Tests & JaCoCo'

  - task: PublishTestResults@2
    displayName: 'Publish Tests Results'
    inputs:
      testResultsFormat: 'Junit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      searchFolder: '${{ parameters.workingDir }}'
      failTaskOnFailedTests: true
    condition: always()

  - task: PublishCodeCoverageResults@2
    displayName: 'Publish Code Coverage'
    inputs:
      # Le ** est crucial pour trouver les fichiers dans tous les sous-modules
      summaryFileLocation: '${{ parameters.workingDir }}/**/target/site/jacoco/jacoco.xml'
      failIfCoverageEmpty: false
    condition: always()

  # NOUVEAU : On copie les rapports en préservant l'arborescence des dossiers (domain/, exposition/...)
  - task: CopyFiles@2
    displayName: 'Prepare JaCoCo files for Artifact'
    inputs:
      SourceFolder: '${{ parameters.workingDir }}'
      Contents: '**/target/site/jacoco/jacoco.xml'
      TargetFolder: '$(Build.ArtifactStagingDirectory)/jacoco-ut'
    condition: always()

  - publish: '$(Build.ArtifactStagingDirectory)/jacoco-ut'
    artifact: 'jacoco-ut'
    displayName: 'Publish UT Coverage Artifact'
    condition: always()