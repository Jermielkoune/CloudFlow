  # ---------------------------------------------------------------------------
  # Stage 5 – Secret Scanning
  # ---------------------------------------------------------------------------
  - stage: secret_scan
    displayName: 'Secret Scanning'
#    dependsOn: security_scans
#    condition: succeeded()
    jobs:
      - job: gitleaks
        displayName: 'Scan repo for secrets with Gitleaks'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 1
          - script: |
              set -euo pipefail
              echo "Downloading Gitleaks v$(GITLEAKS_VERSION)…"
              wget -q https://github.com/gitleaks/gitleaks/releases/download/v$(GITLEAKS_VERSION)/gitleaks_$(GITLEAKS_VERSION)_linux_x64.tar.gz
              tar -xf gitleaks_$(GITLEAKS_VERSION)_linux_x64.tar.gz
              chmod +x gitleaks
              ./gitleaks version
            displayName: 'Install Gitleaks (pinned)'
          - script: |
              set -euo pipefail
              EXTRA_ARGS=""
              if [ -f ".gitleaks.toml" ]; then
                echo "Found .gitleaks.toml → using as config"
                EXTRA_ARGS="--config .gitleaks.toml"
              fi
              echo "Running Gitleaks (JSON)…"
              if ./gitleaks detect --no-banner --redact --source . ${EXTRA_ARGS} --report-format json --report-path "$(GITLEAKS_REPORT_JSON)"; then
                echo "##vso[task.setvariable variable=GITLEAKS_LEAKS]false"
              else
                echo "##vso[task.setvariable variable=GITLEAKS_LEAKS]true"
                echo "Gitleaks found leaks (JSON generation done)."
              fi
              echo "Running Gitleaks (SARIF)…"
              ./gitleaks detect --no-banner --redact --source . ${EXTRA_ARGS} --report-format sarif --report-path "$(GITLEAKS_REPORT_SARIF)" || true
              [ -f "$(GITLEAKS_REPORT_JSON)" ]  && echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]true"  || echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]false"
              [ -f "$(GITLEAKS_REPORT_SARIF)" ] && echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]true" || echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]false"
            displayName: 'Run Gitleaks scan (JSON + SARIF, resilient)'
            continueOnError: true
          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: gitleaks JSON'
            inputs:
              targetPath: '$(GITLEAKS_REPORT_JSON)'
              artifact: 'gitleaks-json'
              publishLocation: 'pipeline'
            condition: and(always(), eq(variables['GITLEAKS_JSON_EXISTS'], 'true'))
          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: gitleaks SARIF'
            inputs:
              targetPath: '$(GITLEAKS_REPORT_SARIF)'
              artifact: 'gitleaks-sarif'
              publishLocation: 'pipeline'
            condition: and(always(), eq(variables['GITLEAKS_SARIF_EXISTS'], 'true'))
          - script: |
              echo "Leaks=$(GITLEAKS_LEAKS), Branch=$(Build.SourceBranch)"
              if [ "$(GITLEAKS_LEAKS)" = "true" ] && [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
                echo "Secrets detected and branch is main → failing the job."; exit 1
              else
                echo "Non-blocking (either no leaks or not on main)."
              fi
            displayName: 'Policy gate: block only on main when leaks'

  # ---------------------------------------------------------------------------
  # Stage 6 – Build & Push image via Jib vers AWS ECR (multi-tagging)
  # ---------------------------------------------------------------------------
  - stage: build_and_push_image
    displayName: 'Build & Push container image (Jib → ECR)'
    #dependsOn: secret_scan
    #condition: succeeded()
    jobs:
      - job: jib_to_ecr
        displayName: 'Jib build & push (multi-tags)'
        steps:
          - checkout: self
          - script: chmod +x mvnw
            displayName: 'Fix exec bit for mvnw'
            workingDirectory: $(BACKEND_DIR)

          # Récupérer l'ACCOUNT_ID AWS et composer le registre ECR
          - task: AWSShellScript@1
            displayName: 'Get AWS Account ID and set ECR_REGISTRY'
            inputs:
              awsCredentials: '$(AWS_SERVICE_CONNECTION)'
              regionName: '$(AWS_REGION)'
              scriptType: 'inline'
              inlineScript: |
                set -e
                ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text | tr -d '[:space:]')
                if [ -z "$ACCOUNT_ID" ]; then
                  echo "##[error]Failed to retrieve AWS Account ID"
                  exit 1
                fi
                echo "AWS Account ID: $ACCOUNT_ID"
                ECR_REGISTRY="${ACCOUNT_ID}.dkr.ecr.$(AWS_REGION).amazonaws.com"
                echo "ECR Registry: $ECR_REGISTRY"
                echo "##vso[task.setvariable variable=ECR_REGISTRY]$ECR_REGISTRY"

          # Extraire la version de l'application depuis pom.xml et définir les variables demandées
          - script: |
              set -e
              VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
              echo "Resolved Maven version: $VERSION"
              echo "##vso[task.setvariable variable=IMAGE_TAG_VERSION]$VERSION"
              echo "##vso[task.setvariable variable=IMAGE_TAG_BUILDID]$(Build.BuildId)"
              BRANCH_NAME="$(Build.SourceBranchName)"
              case "$BRANCH_NAME" in
                main|master)
                  BRANCH_TAG="${BRANCH_NAME}-latest" ;;
                *) BRANCH_TAG="" ;;
              esac
              echo "##vso[task.setvariable variable=BRANCH_TAG]$BRANCH_TAG"
            displayName: 'Resolve tags (version, buildId, branch)'
            workingDirectory: $(BACKEND_DIR)

          # Obtenir le mot de passe ECR (token temporaire) pour Jib
          - task: AWSShellScript@1
            displayName: 'Get ECR login password and set ECR_PASSWORD'
            inputs:
              awsCredentials: '$(AWS_SERVICE_CONNECTION)'
              regionName: '$(AWS_REGION)'
              scriptType: 'inline'
              inlineScript: |
                set -e
                PASSWORD=$(aws ecr get-login-password)
                if [ -z "$PASSWORD" ]; then
                  echo "##[error]Failed to retrieve ECR password"
                  exit 1
                fi
                echo "##vso[task.setvariable variable=ECR_PASSWORD;isSecret=true]$PASSWORD"

          # Compiler le projet et créer le Fat JAR (nécessaire pour Jib)
          - script: |
              set -e
              echo "Compiling project with production profile..."
              ./mvnw -B -ntp clean package -Pprod -DskipTests
            displayName: 'Maven package (production profile)'
            workingDirectory: $(BACKEND_DIR)

          # Construire et pousser l’image via Jib avec multi-tags (appel unique)
          - script: |
              set -e
              BASE_IMAGE="$(ECR_REGISTRY)/$(ECR_REPOSITORY)"
              TAG_IMMUTABLE="v$(IMAGE_TAG_VERSION)-$(IMAGE_TAG_BUILDID)"
              TAG_FLOATING_VERSION="v$(IMAGE_TAG_VERSION)"
              ADDITIONAL_TAGS="$TAG_FLOATING_VERSION"
              if [ -n "$(BRANCH_TAG)" ]; then
                ADDITIONAL_TAGS="$ADDITIONAL_TAGS,$(BRANCH_TAG)"
              fi
              echo "Primary tag: ${BASE_IMAGE}:${TAG_IMMUTABLE}"
              echo "Additional tags: ${ADDITIONAL_TAGS}"
              ./mvnw -B -ntp \
                -Djib.to.image="${BASE_IMAGE}:${TAG_IMMUTABLE}" \
                -Djib.to.tags="${ADDITIONAL_TAGS}" \
                -Djib.to.auth.username=AWS \
                -Djib.to.auth.password="$(ECR_PASSWORD)" \
                jib:build
            displayName: 'Jib build & push (multi-tags in one call)'
            workingDirectory: $(BACKEND_DIR)

          - task: PublishBuildArtifacts@1
            displayName: 'Publish backend JAR'
            inputs:
              PathtoPublish: '$(BACKEND_DIR)/target'
              ArtifactName: 'backend-target'
              publishLocation: 'Container'
