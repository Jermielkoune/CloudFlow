# --- STAGE 1: Triggers & Filters -------------------------------------------
# CI : Déclenchement de la CI sur Azure Pipelines pour le module backend
# Les runs sont limités aux changements pertinents côté Java/Maven
# On active un mode batch dans la section trigger pour regrouper les commits rapprochés et n'exécuter qu'un seul run
# Le filtrage par chemin concentre la CI sur les fichiers Java/Maven
# Cette stratégie rend la CI plus rapide et pertinente pour le backend Java

trigger:
  batch: true
  branches:
    include: [main, develop]
  paths:
    include: ['backend/pom.xml', 'backend/src/**']
    exclude: ['docs/**', 'README.md', '.github/**', '.devcontainer/**', '**/*.md']

# PR (GitHub): build de validation.
# Fusionner d’abord puis découvrir le problème après serait trop tard, donc on vérifie la qualité et la stabilité du code
# avant merge
# autoCancel: true annule le run précédent si de nouveaux commits arrivent. On gère juste le dernier commit
# drafts: false pour éviter de builder les PR en brouillon.
pr:
  autoCancel: true
  drafts: false
  branches:
    include: [main, develop]
  paths:
    include: ['backend/pom.xml', 'backend/src/**']
    exclude: ['docs/**', 'README.md', '.github/**', '.devcontainer/**', '**/*.md']
# ---------------------------------------------------------------------------

# On va demandé à Azure DevOps de nous fournir une VM prête à l'emploi, hébergé par microsoft
pool:
  vmImage: 'ubuntu-latest'

# --- Outillage standardisé du pipeline ------------------------------------------

# L'objectif ici est :
# eviter de hardcoder des valeurs
# simplifier la màj des versions
# faciliter la réutilisation entre pipelines
# rendre la CI prévisible

# On demande ici à l'agent d'aller chercher les variables définies dans la variable group "cloudflow"
variables:
  - group: cloudflow

  # Toolchain pour figer la version de Java à installer, la version de node js pour les outils JS
  - name: JDK_VERSION
    value: '17'
  - name: NODE_VERSION
    value: '22.15.0'

  #--------------------------
  # OWASP Dependency-Check (Docker)
  # C'est un outil de type SCA (Software Composition Analysis) qui analysera les dépendances Maven/NPM
  # et identifie les vulnérabilités

  # Quel conteneur docker utilisé ?
  - name: DEPCHK_IMAGE
    value: 'owasp/dependency-check:latest'
  # Quel seuil de sévérité pour échouer le build ?
  - name: DEPCHK_FAIL_CVSS
    value: '7.0'
  - name: DEPCHK_SUPPRESSION
    value: ''
  # Quel format pour le rapport ?
  - name: DEPCHK_FORMATS
    value: 'JSON'
  # Quelle version pour l'outil ?
  - name: DEPCHK_VERSION
    value: '12.1.1'
  # Dossier caché où l'outil stocke sa bdd CVE
  - name: DEPCHK_DATA_DIR
    value: '$(Pipeline.Workspace)/depcheck-data'
  #--------------------------

  #--------------------------
  # Snyk (SAST) pqyqnt et auota gratuit limité
  # Snyk Code fais du SAST (Static Application Security Testing). Cela permet d'analyser le code source
  # pour chercher : injections, erreurs logiques, mauvaises pratiques, vulnérabilités (trouver un outil open source)
  #  - name: SNYK_VERSION
  #    value: '1.1291.0'
  #  - name: SNYK_SEVERITY
  #    value: 'high'
  #  - name: SNYK_FAIL_ON
  #    value: 'all'
  #  - name: SNYK_MONITOR_ON_MAIN
  #    value: 'true'

  # DAST : Dynamic Application Security Testing
  # L'objectif est de scanner l'appli pendant qu'elle tourne
  - name: RUN_DAST_ON_MAIN
    value: 'true'
  - name: DAST_TARGET_URL
    value: 'http://localhost:8080'

  # GitLeaks
  # L'objectif est de détecter des tokens, des mots de passe, des clés API, des secrets commités par erreur
  - name: GITLEAKS_VERSION
    value: '8.18.1'
  - name: GITLEAKS_REPORT_JSON
    value: 'gitleaks-report.json'
  - name: GITLEAKS_REPORT_SARIF
    value: 'gitleaks-report.sarif'

stages:
  - stage: setup_toolchain
    # Ici, on va s'assurer que la chaine d'outil utilisée pour compiler/tester le projet est
    # cohérente, reproductible, exactement définie et installé avant d'exécuter le build.
    # On rend notre build déterministe en verouillant le toolchain dès le début de la pipeline
    # les raisons : diagnostiquer rapidement un problème d'installation & eviter de lancer toute la
    # pipeline : fail fast, bonne pratique devops
    displayName: 'Stage 1 - Pin JDK & Node'
    jobs:
      - job: pin_tools
        displayName: 'Pin JDK & Node'
        default:
          workingDirectory: backend
        steps:
          - task: JavaToolInstaller@0
            displayName: 'Set up Java $(JDK_VERSION) (x64)'
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - script: |
              echo "JAVA_HOME=$JAVA_HOME"
              java -version
              ./mvnw -v
            displayName: 'Verify Java & Maven version'

          - task: NodeTool@0
            displayName: 'Set up Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'
          - script: |
              node -v
              npm -v
              npm ci
              npm run backend:info
            displayName: 'Verify Node/npm env'

  # --- Stage 2+3: Caches + Quality gates (Spotless, Checkstyle, Prettier) ---
  - stage: deps_and_quality
    displayName: 'Stage 2 - Caches + Quality gates'
    dependsOn: setup_toolchain
    jobs:
      - job: fast_checks
        displayName: 'Pin tools → Restore caches → Prime deps → Quality checks'
        default:
          workingDirectory: backend
        steps:
          # 0) Pin JDK & Node
          - task: JavaToolInstaller@0
            displayName: 'Set up Java $(JDK_VERSION) (x64)'
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - task: NodeTool@0
            displayName: 'Set up Node $(NODE_VERSION)'
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - script: |
              echo "Compute cache keys…"
              MAVEN_KEY=$(sha256sum backend/pom.xml | cut -d' ' -f1)
              echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$MAVEN_KEY"
              if [ -f backend/package-lock.json ]; then
                NPM_KEY=$(sha256sum backend/package-lock.json | cut -d' ' -f1)
              else
                NPM_KEY="no-lock"
              fi
              echo "##vso[task.setvariable variable=NPM_CACHE_KEY]$NPM_KEY"
              echo "MAVEN_CACHE_KEY=$MAVEN_KEY"
              echo "NPM_CACHE_KEY=$NPM_KEY"
            displayName: 'Compute cache keys (sha256)'

          # 2) Restore caches (Maven repo, Maven wrapper, npm cache)
          - task: Cache@2
            displayName: 'Restore Maven repo (~/.m2/repository)'
            inputs:
              key: 'maven | $(Agent.OS) | $(MAVEN_CACHE_KEY)'
              restoreKeys: |
                maven | $(Agent.OS)
              path: '$(HOME)/.m2/repository'

          - task: Cache@2
            displayName: 'Restore Maven wrapper (~/.m2/wrapper)'
            inputs:
              key: 'maven-wrapper | $(Agent.OS)'
              path: '$(HOME)/.m2/wrapper'

          - task: Cache@2
            displayName: 'Restore npm cache (~/.npm)'
            inputs:
              key: 'npm | $(Agent.OS) | $(NPM_CACHE_KEY)'
              restoreKeys: |
                npm | $(Agent.OS)
              path: '$(HOME)/.npm'

          # 3) Priming des dépendances (pour remplir/valider les caches)
          - script: |
              ./mvnw -ntp -B dependency:go-offline
            displayName: 'Prime Maven deps (go-offline)'

          - script: npm ci
            displayName: 'Prime npm cache (npm ci)'

          # 4) Gates de formatage/qualité (fail-fast)
          - script: |
              ./mvnw -ntp -B spotless:check
            displayName: 'Spotless check (Java)'

          - script: |
              ./mvnw -ntp -B -DskipTests=true checkstyle:check
            displayName: 'Checkstyle check (Java)'

          - script: |
              npx prettier --write "**/*.{md,json,yml,yaml}"
            displayName: 'Prettier format (md/json/yml)'

  # --- Stage 4: Tests unitaires & rapports -----------------------------------
  - stage: unit_tests
    displayName: 'Stage 4 - Tests unitaires & rapports'
    dependsOn: deps_and_quality
    jobs:
      - job: run_unit_tests
        displayName: 'Run unit tests + publish reports'
        steps:
          - task: JavaToolInstaller@0
            displayName: 'Set up Java $(JDK_VERSION) (x64)'
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - script: |
              echo "Compute cache key for Maven…"
              MAVEN_KEY=$(sha256sum backend/pom.xml | cut -d' ' -f1)
              echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$MAVEN_KEY"
              echo "MAVEN_CACHE_KEY=$MAVEN_KEY"
            displayName: 'Compute Maven cache key (sha256)'

          - task: Cache@2
            displayName: 'Restore Maven repo (~/.m2/repository)'
            inputs:
              key: 'maven | $(Agent.OS) | $(MAVEN_CACHE_KEY)'
              restoreKeys: |
                maven | $(Agent.OS)
              path: '$(HOME)/.m2/repository'

          - task: Cache@2
            displayName: 'Restore Maven wrapper (~/.m2/wrapper)'
            inputs:
              key: 'maven-wrapper | $(Agent.OS)'
              path: '$(HOME)/.m2/wrapper'

          # 3) Run unit tests
          - script: |
              ./mvnw -B -ntp clean test
            displayName: 'Maven unit tests'
            workingDirectory: backend

          # 4) Publier les résultats JUnit (Surefire)
          - task: PublishTestResults@2
            displayName: 'Publish JUnit test results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'backend/target/surefire-reports/*.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'Unit tests (Surefire)'

          # 5) Publier la couverture JaCoCo (XML + HTML)
          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage (JaCoCo)'
            inputs:
              codeCoverageTool: 'JaCoCo'
              summaryFileLocation: 'backend/target/site/jacoco/jacoco.xml'
              reportDirectory: 'backend/target/site/jacoco'
              failIfCoverageEmpty: false # true si tu veux échouer sans rapport

          # 6) Conserver les rapports en artefacts de pipeline
          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: surefire-reports'
            inputs:
              targetPath: 'backend/target/surefire-reports'
              artifact: 'unit-tests-surefire'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: jacoco-site'
            inputs:
              targetPath: 'backend/target/site/jacoco'
              artifact: 'jacoco-coverage'
              publishLocation: 'pipeline'

  # --- Stage 5: SonarCloud (no extension, reuse tests, block on QG) ---------
  - stage: quality_gate
    displayName: 'Stage 5 - SonarCloud (Quality Gate)'
    dependsOn: unit_tests
    condition: succeeded()
    jobs:
      - job: sonar_analysis
        displayName: 'Compile -> Sonar -> Block on QG'
        pool:
          vmImage: 'ubuntu-latest'
        variables:
          SONAR_TOKEN: $(SONAR_TOKEN)
        steps:
          # Java 17
          - task: JavaToolInstaller@0
            displayName: 'Set up Java $(JDK_VERSION)'
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          # Caches Maven
          - script: |
              MAVEN_KEY=$(sha256sum backend/pom.xml | cut -d' ' -f1)
              echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$MAVEN_KEY"
            displayName: 'Compute Maven cache key (sha256)'
          - task: Cache@2
            displayName: 'Restore Maven repo (~/.m2/repository)'
            inputs:
              key: 'maven | $(Agent.OS) | $(MAVEN_CACHE_KEY)'
              restoreKeys: |
                maven | $(Agent.OS)
              path: '$(HOME)/.m2/repository'
          - task: Cache@2
            displayName: 'Restore Maven wrapper (~/.m2/wrapper)'
            inputs:
              key: 'maven-wrapper | $(Agent.OS)'
              path: '$(HOME)/.m2/wrapper'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download JaCoCo report'
            inputs:
              artifact: 'jacoco-coverage'
              path: 'backend/target/site/jacoco'
          - task: DownloadPipelineArtifact@2
            displayName: 'Download JUnit surefire reports'
            inputs:
              artifact: 'unit-tests-surefire'
              path: 'backend/target/surefire-reports'

          # Compile sans tests (fournit target/classes pour règles Java)
          - script: ./mvnw -B -ntp -Pprod -DskipTests=true -DskipITs=true package
            workingDirectory: backend
            displayName: 'Compile only'

          - script: |
              if [ -z "${SONAR_TOKEN}" ]; then
                echo "❌ SONAR_TOKEN is NOT set"; exit 1
              fi
              echo "✅ SONAR_TOKEN is set (length: ${#SONAR_TOKEN})"
            displayName: 'Sanity check: SONAR_TOKEN presence'

          # Analyse Sonar via Maven (utilise sonar-project.properties)
          - script: |
              ./mvnw -B -ntp sonar:sonar \
                -Dsonar.host.url=https://sonarcloud.io \
                -Dsonar.organization=sikaseal \
                -Dsonar.projectKey=sikaseal_cloudflow \
                -Dsonar.branch.name="$(Build.SourceBranchName)" \
                -Dsonar.token="$SONAR_TOKEN" \
                -Dsonar.java.binaries=target/classes \
                -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
                -Dsonar.junit.reportPaths=target/surefire-reports
            workingDirectory: backend
            displayName: 'Run Sonar analysis (Maven + properties file)'

          # Blocage Quality Gate via API SonarCloud (branche courante)
          - script: |
              echo "Waiting for Quality Gate..."
              ATTEMPTS=60
              SLEEP=10
              BRANCH="$(Build.SourceBranchName)"
              URL="https://sonarcloud.io/api/qualitygates/project_status?projectKey=sikaseal_cloudflow&branch=${BRANCH}"
              for i in $(seq 1 $ATTEMPTS); do
                RESP=$(curl -s -u "$(SONAR_TOKEN):" "$URL" || true)
                echo "Attempt $i: $(echo "$RESP" | tr -d '\n')"
                if echo "$RESP" | grep -q '"status":"OK"'; then
                  echo "Quality Gate: OK"; exit 0
                elif echo "$RESP" | grep -q '"status":"ERROR"'; then
                  echo "Quality Gate: FAILED"; exit 1
                fi
                sleep $SLEEP
              done
              echo "Quality Gate timeout"; exit 2
            displayName: 'Block on Quality Gate (poll SonarCloud)'
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  # --- Stage 6: Tests d’intégration ---------------------------
  - stage: integration_tests
    displayName: 'Stage 6 - Tests d’intégration'
    dependsOn: quality_gate
    condition: succeeded()
    variables:
      USE_COMPOSE: 'true' # 'true' pour démarrer docker compose (DB externe)
    jobs:
      - job: itests
        displayName: 'Run Failsafe ITs + publish reports'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # 0) Tooling (VM neuve)
          - task: JavaToolInstaller@0
            displayName: 'Set up Java $(JDK_VERSION)'
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - script: chmod +x mvnw
            displayName: 'Fix exec bit for mvnw'
            workingDirectory: backend

          # 1) Caches Maven
          - script: |
              MAVEN_KEY=$(sha256sum backend/pom.xml | cut -d' ' -f1)
              echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$MAVEN_KEY"
            displayName: 'Compute Maven cache key (sha256)'

          - task: Cache@2
            displayName: 'Restore Maven repo (~/.m2/repository)'
            inputs:
              key: 'maven | $(Agent.OS) | $(MAVEN_CACHE_KEY)'
              restoreKeys: |
                maven | $(Agent.OS)
              path: '$(HOME)/.m2/repository'

          - task: Cache@2
            displayName: 'Restore Maven wrapper (~/.m2/wrapper)'
            inputs:
              key: 'maven-wrapper | $(Agent.OS)'
              path: '$(HOME)/.m2/wrapper'

          # 2) (Option) Environnement DB via docker compose
          - script: |
              set -e
              echo "Starting docker compose (PostgreSQL)…"
              docker compose -f src/main/docker/postgresql.yml up -d
              echo "Waiting for DB health..."
              CID="$(docker compose -f src/main/docker/postgresql.yml ps -q postgresql || true)"
              if [ -z "$CID" ]; then
                echo "WARN: container id not found, sleep 20s"
                sleep 20
              else
                for i in {1..30}; do
                  STATUS="$(docker inspect -f '{{.State.Health.Status}}' "$CID" 2>/dev/null || echo "unknown")"
                  echo "Attempt $i: health=$STATUS"
                  if [ "$STATUS" = "healthy" ]; then break; fi
                  sleep 2
                done
              fi
            workingDirectory: backend
            displayName: '(optional) Compose up: PostgreSQL'
            condition: eq(variables['USE_COMPOSE'], 'true')

          - script: |
              ./mvnw -B -ntp -DskipTests=true verify
            workingDirectory: backend
            displayName: 'Maven integration tests '

          # Debug: voir ce qui a été produit
          - script: |
              echo "Tree of backend/target (debug)"
              ls -la backend/target || true
              ls -la backend/target/site || true
            displayName: 'Debug: list target dirs'

          # 4) Détecter la présence des outputs IT et exposer des variables de step
          - script: |
              if [ -d "backend/target/failsafe-reports" ]; then
                echo "##vso[task.setvariable variable=hasFailsafe]true"
              else
                echo "##vso[task.setvariable variable=hasFailsafe]false"
              fi
              if [ -f "backend/target/site/jacoco-it/jacoco.xml" ]; then
                echo "##vso[task.setvariable variable=hasJacocoIt]true"
              else
                echo "##vso[task.setvariable variable=hasJacocoIt]false"
              fi
            displayName: 'Detect IT outputs (failsafe & jacoco-it)'

          # 5) Publier JUnit IT (Failsafe) + Couverture JaCoCo-IT (si présent)
          - task: PublishTestResults@2
            displayName: 'Publish JUnit IT results (Failsafe)'
            condition: and(succeeded(), eq(variables['hasFailsafe'], 'true'))
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'backend/target/failsafe-reports/*.xml'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'Integration tests (Failsafe)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: failsafe-reports'
            condition: and(succeeded(), eq(variables['hasFailsafe'], 'true'))
            inputs:
              targetPath: 'backend/target/failsafe-reports'
              artifact: 'itests-failsafe'
              publishLocation: 'pipeline'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish IT code coverage (JaCoCo IT)'
            condition: and(succeeded(), eq(variables['hasJacocoIt'], 'true'))
            inputs:
              codeCoverageTool: 'JaCoCo'
              summaryFileLocation: 'backend/target/site/jacoco-it/jacoco.xml'
              reportDirectory: 'backend/target/site/jacoco-it'
              failIfCoverageEmpty: false

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: jacoco-it'
            condition: and(succeeded(), eq(variables['hasJacocoIt'], 'true'))
            inputs:
              targetPath: 'backend/target/site/jacoco-it'
              artifact: 'jacoco-coverage-it'
              publishLocation: 'pipeline'

          # 7) Teardown compose (toujours si utilisé)
          - script: |
              docker compose -f src/main/docker/postgresql.yml down -v || true
            workingDirectory: backend
            displayName: '(optional) Compose down'
            condition: and(always(), eq(variables['USE_COMPOSE'], 'true'))

  # --- Stage 7: Security scans (SAST & optional DAST) -------------------------
  - stage: security_scans
    displayName: 'Stage 7 - Security scans (SAST & optional DAST)'
    dependsOn: integration_tests
    condition: succeeded()
    jobs:
      # -------------------- SAST (DepCheck via Docker) --------------------
      - job: sast_depcheck_docker
        displayName: 'SAST — OWASP Dependency-Check (Docker + SARIF)'
        pool: { vmImage: 'ubuntu-latest' }
        steps:
          - task: JavaToolInstaller@0
            displayName: 'Set up Java $(JDK_VERSION)'
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - script: chmod +x mvnw
            displayName: 'Fix exec bit for mvnw'
            workingDirectory: backend

          #1) Cache maven
          - script: |
              MAVEN_KEY=$(sha256sum backend/pom.xml | cut -d' ' -f1)
              echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$MAVEN_KEY"
            displayName: 'Compute Maven cache key (sha256)'

          - task: Cache@2
            displayName: 'Restore Maven repo (~/.m2/repository)'
            inputs:
              key: 'maven | $(Agent.OS) | $(MAVEN_CACHE_KEY)'
              restoreKeys: |
                maven | $(Agent.OS)
              path: '$(HOME)/.m2/repository'

          - task: Cache@2
            displayName: 'Restore Maven wrapper (~/.m2/wrapper)'
            inputs:
              key: 'maven-wrapper | $(Agent.OS)'
              path: '$(HOME)/.m2/wrapper'

          - script: mkdir -p "$(DEPCHK_DATA_DIR)"
            displayName: 'Ensure depcheck data dir exists'

          - task: Cache@2
            displayName: 'Restore Dependency-Check NVD data'
            inputs:
              key: 'depcheck-nvd | $(Agent.OS)'
              path: '$(DEPCHK_DATA_DIR)'

          # 2) Suppression file optionnel
          - script: |
              if [ -n "$(DEPCHK_SUPPRESSION)" ] && [ -f "backend/$(DEPCHK_SUPPRESSION)" ]; then
                echo "##vso[task.setvariable variable=DEPCHK_SUP_ARG]-DsuppressionFile=$(DEPCHK_SUPPRESSION)"
                echo "Using suppression file: $(DEPCHK_SUPPRESSION)"
              else
                echo "No suppression file found or not set."
                echo "##vso[task.setvariable variable=DEPCHK_SUP_ARG]"
              fi
            displayName: 'Detect optional suppression file'
            workingDirectory: backend

          - script: |
              if [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
                echo "##vso[task.setvariable variable=DC_UPDATE]true"
              else
                echo "##vso[task.setvariable variable=DC_UPDATE]false"
              fi
            displayName: 'Decide DC update (main=true, PR/feature=false)'

          # 3) Scan fail seulement sur main
          - script: |
              set -e
              echo "Using DEPCHK_VERSION=$DEPCHK_VERSION"
              echo "Using DEPCHK_FORMATS=$DEPCHK_FORMATS"
              echo "Using DEPCHK_FAIL_CVSS=$DEPCHK_FAIL_CVSS"
              echo "NVD API key present? $([ -n "${NVD_API_KEY:-}" ] && echo yes || echo no)"
              echo "autoupdate (DC_UPDATE) = ${DC_UPDATE:-false}"

              ./mvnw -B -ntp \
                org.owasp:dependency-check-maven:$(DEPCHK_VERSION):check \
                -DskipTests=true \
                -Dformat=$(DEPCHK_FORMATS) \
                -DfailOnCVSS=$(DEPCHK_FAIL_CVSS) \
                -Dnvd.api.key=${NVD_API_KEY} \
                -Dautoupdate=${DC_UPDATE} \
                -Danalyzer.retirejs.enabled=false \
                -Danalyzer.node.enabled=false \
                -Danalyzer.nuspec.enabled=false \
                -Danalyzer.assembly.enabled=false \
                -Danalyzer.pip.enabled=false \
                -Danalyzer.php.composer.enabled=false \
                -Danalyzer.ruby.gemspec.enabled=false \
                -Danalyzer.cocoapods.enabled=false \
                -Danalyzer.swift.package.resolved.enabled=false \
                -DossindexAnalyzerEnabled=false \
                -DskipTestScope=true \
                -DskipProvidedScope=true \
                -Ddata.dir=${DEPCHK_DATA_DIR}
            workingDirectory: backend
            displayName: 'Run OWASP Dependency-Check (CVSS ≥ $(DEPCHK_FAIL_CVSS))'
            continueOnError: ${{ ne(variables['Build.SourceBranch'], 'refs/heads/main') }}
            env:
              DEPCHK_VERSION: $(DEPCHK_VERSION)
              DEPCHK_FORMATS: $(DEPCHK_FORMATS)
              DEPCHK_FAIL_CVSS: $(DEPCHK_FAIL_CVSS)
              DEPCHK_DATA_DIR: $(DEPCHK_DATA_DIR)
              NVD_API_KEY: $(NVD_API_KEY)

          # 4) Convertir JSON -> SARIF (inline python)
          - script: |
              set -eu
              REPORT_JSON="backend/target/dependency-check-report.json"
              REPORT_SARIF="backend/target/dependency-check-report.sarif"
              if [ ! -f "$REPORT_JSON" ]; then
                echo "No JSON report found at $REPORT_JSON — ensure DEPCHK_FORMATS contains JSON."
                exit 0
              fi
              cat > depcheck_json_to_sarif.py << 'PY'
              import json, sys
              src = sys.argv[1]; dst = sys.argv[2]
              with open(src, 'r', encoding='utf-8') as f:
              data = json.load(f)
              results = []
              rules = {}
              deps = data.get("dependencies", [])
              for d in deps:
                file = d.get("fileName") or d.get("filePath") or "unknown"
                vulns = d.get("vulnerabilities") or []
                for v in vulns:
                  rule_id = v.get("name") or v.get("id") or "UNKNOWN"
                  sev = (v.get("severity") or "").upper()
                  score = v.get("cvssScore") or v.get("cvssv3",{}).get("baseScore") or 0
                  desc = v.get("description") or ""
                  url = v.get("url") or ""
                  # Enregistrer la règle (unique)
                  if rule_id not in rules:
                    rules[rule_id] = {
                    "id": rule_id,
                    "name": rule_id,
                    "shortDescription": { "text": rule_id },
                    "fullDescription": { "text": desc[ :2000 ] },
                    "helpUri": url or None,
                    "properties": { "problem.severity": sev, "security-severity": str(score) }
                }
              # Résultat
              results.append({
                "ruleId": rule_id,
                "level": ("error" if score and float(score) >= 7.0 else "warning"),
                "message": { "text": f"{ rule_id } ({ sev }) score={ score }: { desc[ :300 ] }"},
                        "locations": [ {
                  "physicalLocation": { "artifactLocation": { "uri": file } }
                } ]
              })
              sarif = {
                "version": "2.1.0",
                "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
                "runs": [ {
                  "tool": {
                    "driver": {
                      "name": "OWASP Dependency-Check (Docker)",
                      "informationUri": "https://owasp.org/www-project-dependency-check/",
                      "rules": list(rules.values())
                    }
                  },
                  "results": results
                } ]
              }
              with open(dst, 'w', encoding='utf-8') as f:
                json.dump(sarif, f, indent=2)
              print(f"SARIF written to {dst}, findings: { len(results) }")
              PY
                python3 depcheck_json_to_sarif.py "$REPORT_JSON" "$REPORT_SARIF" || true
            displayName: 'Convert Dependency-Check JSON to SARIF'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: depcheck JSON'
            inputs:
              targetPath: 'backend/target/dependency-check-report.json'
              artifact: 'depcheck-json'
              publishLocation: 'pipeline'
            condition: always()

      # -------------------- DAST (OWASP ZAP) --------------------
      - job: dast_zap
        displayName: 'DAST — OWASP ZAP baseline'
        pool: { vmImage: 'ubuntu-latest' }
        condition: and(succeeded(), eq(variables['RUN_DAST_ON_MAIN'], 'true'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
        steps:
          - script: chmod +x mvnw
            displayName: 'Fix exec bit for mvnw'
            workingDirectory: backend

          - script: |
              ./mvnw -B -ntp -DskipTests=true spring-boot:run -Dspring-boot.run.profiles=e2e &
              for i in {1..30}; do
                if curl -fsS "$(DAST_TARGET_URL)/management/health" >/dev/null 2>&1; then
                  echo "App is up"; break
                fi
                echo "Waiting app..."; sleep 2
              done
            workingDirectory: backend
            displayName: 'Start backend locally (e2e) & wait health'

          - script: |
              set -e

              OUT_DIR="$(System.DefaultWorkingDirectory)/dast"
              mkdir -p "$OUT_DIR"

              : "${DAST_TARGET_URL:=''}"
              if [ -z "$DAST_TARGET_URL" ]; then
                echo "ERROR: DAST_TARGET_URL is empty. Define it (e.g. http://localhost:8080)"; exit 1
              fi

              echo "Workspace: $(System.DefaultWorkingDirectory)"
              echo "DAST_TARGET_URL=$DAST_TARGET_URL"
              echo "OUT_DIR=$OUT_DIR"

              docker run --rm -t \
                --network="host" \
              -u "$(id -u):$(id -g)" \
              -v "$OUT_DIR:/zap/wrk" \
              -w /zap/wrk \
              owasp/zap2docker-stable zap-baseline.py \
                -t "$DAST_TARGET_URL" \
                -r zap_report.html || true

              echo "Listing $OUT_DIR:"
              ls -la "$OUT_DIR" || true

              if [ ! -f "$OUT_DIR/zap_report.html" ]; then
                echo "<html><body><h1>ZAP report missing</h1><p>No report generated. Check previous logs.</p></body></html>" > "$OUT_DIR/zap_report.html"
                echo "WARN: zap_report.html was not generated by ZAP; created a placeholder."
              fi
            displayName: 'OWASP ZAP baseline scan (HTML report)'

          - script: |
              echo "Stopping local Spring app..."
              pkill -f "org.springframework.boot" || true
              pkill -f "spring-boot:run" || true
              if command -v lsof >/dev/null 2>&1; then
                PIDS=$(lsof -tiTCP:8080 -sTCP:LISTEN || true)
                if [ -n "$PIDS" ]; then echo "$PIDS" | xargs -r kill -9 || true; fi
              fi
            displayName: 'Cleanup — stop local Spring app'
            condition: always()

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: zap-report.html'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/dast/zap_report.html'
              artifact: 'zap-report'
              publishLocation: 'pipeline'

  - stage: secret_scan
    displayName: 'Stage 8 - Secret Scanning'
    dependsOn: security_scans
    condition: succeeded()
    jobs:
      - job: gitleaks
        displayName: 'Scan repo for secrets with Gitleaks'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
            fetchDepth: 1 # 0 = full history; 1 pour scanner seulement l’état courant

          - script: |
              set -euo pipefail
              echo "Downloading Gitleaks v$(GITLEAKS_VERSION)…"
              wget -q https://github.com/gitleaks/gitleaks/releases/download/v$(GITLEAKS_VERSION)/gitleaks_$(GITLEAKS_VERSION)_linux_x64.tar.gz
              tar -xf gitleaks_$(GITLEAKS_VERSION)_linux_x64.tar.gz
              # pas de sudo sur agents hosted : on garde le binaire local
              chmod +x gitleaks
              ./gitleaks version
            displayName: 'Install Gitleaks (pinned)'

          - script: |
              set -euo pipefail

              EXTRA_ARGS=""
              if [ -f ".gitleaks.toml" ]; then
                echo "Found .gitleaks.toml → using as config"
                EXTRA_ARGS="--config .gitleaks.toml"
              fi

              echo "Running Gitleaks (JSON)…"
              if ./gitleaks detect --no-banner --redact --source . ${EXTRA_ARGS} \
                   --report-format json --report-path "$(GITLEAKS_REPORT_JSON)"; then
                echo "##vso[task.setvariable variable=GITLEAKS_LEAKS]false"
              else
                echo "##vso[task.setvariable variable=GITLEAKS_LEAKS]true"
                echo "Gitleaks found leaks (JSON generation done)."
              fi

              echo "Running Gitleaks (SARIF)…"
              # On génère aussi le SARIF, sans interrompre si fuites
              ./gitleaks detect --no-banner --redact --source . ${EXTRA_ARGS} \
                --report-format sarif --report-path "$(GITLEAKS_REPORT_SARIF)" || true

              # Marquer la présence des rapports
              [ -f "$(GITLEAKS_REPORT_JSON)" ]  && echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]true"  || echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]false"
              [ -f "$(GITLEAKS_REPORT_SARIF)" ] && echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]true" || echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]false"
            displayName: 'Run Gitleaks scan (JSON + SARIF, resilient)'
            continueOnError: true

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: gitleaks JSON'
            inputs:
              targetPath: '$(GITLEAKS_REPORT_JSON)'
              artifact: 'gitleaks-json'
              publishLocation: 'pipeline'
            condition: and(always(), eq(variables['GITLEAKS_JSON_EXISTS'], 'true'))

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: gitleaks SARIF'
            inputs:
              targetPath: '$(GITLEAKS_REPORT_SARIF)'
              artifact: 'gitleaks-sarif'
              publishLocation: 'pipeline'
            condition: and(always(), eq(variables['GITLEAKS_SARIF_EXISTS'], 'true'))

          # 3) Gate de politique: fail seulement sur main si des fuites existent
          - script: |
              echo "Leaks=$(GITLEAKS_LEAKS), Branch=$(Build.SourceBranch)"
              if [ "$(GITLEAKS_LEAKS)" = "true" ] && [ "$(Build.SourceBranch)" = "refs/heads/main" ]; then
                echo "❌ Secrets detected and branch is main → failing the job."
                exit 1
              else
                echo "✅ Non-blocking (either no leaks or not on main)."
              fi
            displayName: 'Policy gate: block only on main when leaks'

          - script: |
              set -e
              if [ -f "$(GITLEAKS_REPORT_JSON)" ]; then
                echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]true"
              else
                echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]false"
              fi
              if [ -f "$(GITLEAKS_REPORT_SARIF)" ]; then
                echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]true"
              else
                echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]false"
              fi
              echo "JSON_EXISTS=$(GITLEAKS_JSON_EXISTS)"
              echo "SARIF_EXISTS=$(GITLEAKS_SARIF_EXISTS)"
            displayName: 'Detect Gitleaks outputs (set variables)'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: gitleaks JSON'
            inputs:
              targetPath: '$(GITLEAKS_REPORT_JSON)'
              artifact: 'gitleaks-json'
              publishLocation: 'pipeline'
            condition: and(succeeded(), eq(variables['GITLEAKS_JSON_EXISTS'], 'true'))

          - task: PublishPipelineArtifact@1
            displayName: 'Publish artifact: gitleaks SARIF'
            inputs:
              targetPath: '$(GITLEAKS_REPORT_SARIF)'
              artifact: 'gitleaks-sarif'
              publishLocation: 'pipeline'
            condition: and(succeeded(), eq(variables['GITLEAKS_SARIF_EXISTS'], 'true'))

