# --- STAGE 1: Triggers & Filters -------------------------------------------
# CI: ne déclenche que si le code Java/Maven change. Batch = vrai pour éviter
# les runs en rafale quand plusieurs commits arrivent rapidement.
trigger:
  batch: true
  branches:
    include: [ main, develop, "feature/*" ]
  paths:
    include: [ "backend/pom.xml", "backend/src/**" ]
    exclude: [ "docs/**", "README.md", ".github/**", ".devcontainer/**", "**/*.md" ]

# PR (GitHub): build de validation uniquement si code Java change.
# autoCancel: true annule le run précédent si de nouveaux commits arrivent.
# drafts: false pour éviter de builder les PR en brouillon.
pr:
  autoCancel: true
  drafts: false
  branches:
    include: [ main, develop, "feature/*" ]
  paths:
    include: [ "backend/pom.xml", "backend/src/**" ]
    exclude: [ "docs/**", "README.md", ".github/**", ".devcontainer/**", "**/*.md" ]
# ---------------------------------------------------------------------------

# Microsoft-hosted agent (Azure Pipelines)
pool:
  vmImage: "ubuntu-latest"

# --- Variables versions outillage ------------------------------------------
variables:
  JDK_VERSION: '17'
  NODE_VERSION: '22.x'

stages:
  - stage: setup_toolchain
    displayName: "Stage 2 — Pin JDK & Node"
    jobs:
      - job: pin_tools
        displayName: "Pin JDK $(JDK_VERSION) & Node $(NODE_VERSION)"
        steps:
          - task: JavaToolInstaller@0
            displayName: "Set up Java $(JDK_VERSION) (x64)"
            inputs:
              versionSpec: '$(JDK_VERSION)'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - script: |
              echo "JAVA_HOME=$JAVA_HOME"
              java -version
              ./mvnw -v
            displayName: "Verify Java & Maven"
            workingDirectory: backend

          - task: NodeTool@0
            displayName: "Use Node $(NODE_VERSION)"
            inputs:
              versionSpec: '$(NODE_VERSION)'

          - script: |
              node -v
              npm -v
              npm ci
              npm run backend:info
            displayName: "Verify Node/npm + run a script"
            workingDirectory: backend
