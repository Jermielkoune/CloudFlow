# ---------------------------------------------------------------------------
# Template : Security SAST (Static Application Security Testing)
# Outil    : Trivy (Aqua Security)
# Objectif : Scanner le code, les dépendances, les secrets et l'IaC
# Optimisation : Utilise le cache Azure pour la DB de vulnérabilités
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
    displayName: "Dossier racine du code à analyser"
  - name: trivyVersion
    type: string
    default: '0.69.3'
  - name: severity
    type: string
    default: 'CRITICAL,HIGH'
  - name: trivyCachePath
    type: string
    default: $(Pipeline.Workspace)/.trivy-cache
  - name: githubToken
    type: string
    default: $(GITHUB_TOKEN)

steps:
  - task: Cache@2
    displayName: 'Cache Trivy DB'
    inputs:
      key: 'trivy-db | "$(Agent.OS)" | $(Date:yyyy-MM-dd)'
      restoreKeys: |
        trivy-db | "$(Agent.OS)"
      path: ${{ parameters.trivyCachePath }}

  - bash: |
      set -e
      echo "--- Installation de Trivy v${{ parameters.trivyVersion }} ---"
      curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b $(Agent.TempDirectory) v${{ parameters.trivyVersion }}
      TRIVY_BIN=$(Agent.TempDirectory)/trivy

      echo "--- Configuration ---"
      export TRIVY_CACHE_DIR=${{ parameters.trivyCachePath }}
      mkdir -p $TRIVY_CACHE_DIR

      echo "Target: ${{ parameters.workingDir }}"
      echo "Severity: ${{ parameters.severity }}"

      echo "--- Exécution Scan : Rapport SARIF ---"
      $TRIVY_BIN fs \
        --scanners vuln,secret,misconfig \
        --format sarif \
        --output $(Build.ArtifactStagingDirectory)/trivy-report.sarif \
        ${{ parameters.workingDir }}

      echo "--- Exécution Scan : Quality Gate ---"
      $TRIVY_BIN fs \
        --scanners vuln,secret,misconfig \
        --severity ${{ parameters.severity }} \
        --exit-code 1 \
        --format table \
        --ignore-unfixed \
        ${{ parameters.workingDir }}
    displayName: 'Run Trivy Security Scan'
    env:
      GITHUB_TOKEN: ${{ parameters.githubToken }}
      TRIVY_NO_PROGRESS: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Security Report'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/trivy-report.sarif'
      ArtifactName: 'CodeAnalysisLogs'
      publishLocation: 'Container'
    condition: always()
