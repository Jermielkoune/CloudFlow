# Template: Cache Maven
# Description: Restaure les caches Maven (repository et wrapper) avec clé configurable ou externe
# Paramètres:
#   - backendDir: Répertoire du backend (défaut: backend)
#   - cacheKeysStrategy: Stratégie de clé de cache (pom-hash ou sourceVersion, défaut: pom-hash)
#   - useExternalKey: Utiliser une clé externe déjà calculée (défaut: false)
#   - cacheKeyOverride: Valeur de clé externe (défaut: '')

parameters:
  - name: backendDir
    type: string
    default: 'backend'
  - name: cacheKeysStrategy
    type: string
    default: 'pom-hash'
    values:
      - 'pom-hash'
      - 'sourceVersion'
  - name: useExternalKey
    type: boolean
    default: false
  - name: cacheKeyOverride
    type: string
    default: ''

steps:
  - checkout: self

  # Option 1: Use external key if provided
  - ${{ if and(eq(parameters.useExternalKey, true), ne(parameters.cacheKeyOverride, '')) }}:
    - script: |
        set -e
        echo "Using external MAVEN_CACHE_KEY: ${{ parameters.cacheKeyOverride }}"
        echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]${{ parameters.cacheKeyOverride }}"
      displayName: 'Set Maven cache key (external override)'

  # Option 2: Compute cache key based on strategy
  - ${{ if or(ne(parameters.useExternalKey, true), eq(parameters.cacheKeyOverride, '')) }}:
    - ${{ if eq(parameters.cacheKeysStrategy, 'pom-hash') }}:
      - script: |
          set -e
          KEY=$(sha256sum ${{ parameters.backendDir }}/pom.xml | cut -d' ' -f1)
          echo "Computed pom-hash: $KEY"
          echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$KEY"
        displayName: 'Compute Maven cache key (sha256 of pom.xml)'

    - ${{ if eq(parameters.cacheKeysStrategy, 'sourceVersion') }}:
      - script: |
          set -e
          echo "Using Build.SourceVersion as cache key"
          echo "##vso[task.setvariable variable=MAVEN_CACHE_KEY]$(Build.SourceVersion)"
        displayName: 'Set Maven cache key (Build.SourceVersion)'

  - task: Cache@2
    displayName: 'Restore ~/.m2/repository'
    inputs:
      key: 'maven | $(Agent.OS) | $(MAVEN_CACHE_KEY)'
      restoreKeys: |
        maven | $(Agent.OS)
      path: '$(HOME)/.m2/repository'

  - task: Cache@2
    displayName: 'Restore ~/.m2/wrapper'
    inputs:
      key: 'maven-wrapper | $(Agent.OS)'
      path: '$(HOME)/.m2/wrapper'
