# Template: Secret scanning avec Gitleaks
# Description: Installe Gitleaks, génère rapports JSON/SARIF et applique policy gate
# Paramètres:
#   - gitleaksVersion: Version de Gitleaks (défaut: 8.18.1)
#   - jsonReportName: Nom du rapport JSON (défaut: gitleaks-report.json)
#   - sarifReportName: Nom du rapport SARIF (défaut: gitleaks-report.sarif)
#   - blockOnMainWhenLeaks: Bloquer sur main si secrets détectés (défaut: true)
#   - useConfigFile: Utiliser .gitleaks.toml si présent (défaut: true)

parameters:
  - name: gitleaksVersion
    type: string
    default: '8.18.1'
  - name: jsonReportName
    type: string
    default: 'gitleaks-report.json'
  - name: sarifReportName
    type: string
    default: 'gitleaks-report.sarif'
  - name: blockOnMainWhenLeaks
    type: boolean
    default: true
  - name: useConfigFile
    type: boolean
    default: true

steps:
  - checkout: self
    fetchDepth: 1

  - script: |
      set -euo pipefail
      echo "Downloading Gitleaks v${{ parameters.gitleaksVersion }}…"
      wget -q https://github.com/gitleaks/gitleaks/releases/download/v${{ parameters.gitleaksVersion }}/gitleaks_${{ parameters.gitleaksVersion }}_linux_x64.tar.gz
      tar -xf gitleaks_${{ parameters.gitleaksVersion }}_linux_x64.tar.gz
      chmod +x gitleaks
      ./gitleaks version
    displayName: 'Install Gitleaks (pinned v${{ parameters.gitleaksVersion }})'

  - script: |
      set -euo pipefail
      EXTRA_ARGS=""
      if [ "${{ parameters.useConfigFile }}" = "True" ] && [ -f ".gitleaks.toml" ]; then
        echo "Found .gitleaks.toml → using as config"
        EXTRA_ARGS="--config .gitleaks.toml"
      fi
      echo "Running Gitleaks (JSON)…"
      if ./gitleaks detect --no-banner --redact --source . ${EXTRA_ARGS} --report-format json --report-path "${{ parameters.jsonReportName }}"; then
        echo "##vso[task.setvariable variable=GITLEAKS_LEAKS]false"
      else
        echo "##vso[task.setvariable variable=GITLEAKS_LEAKS]true"
        echo "Gitleaks found leaks (JSON generation done)."
      fi
      echo "Running Gitleaks (SARIF)…"
      ./gitleaks detect --no-banner --redact --source . ${EXTRA_ARGS} --report-format sarif --report-path "${{ parameters.sarifReportName }}" || true
      [ -f "${{ parameters.jsonReportName }}" ]  && echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]true"  || echo "##vso[task.setvariable variable=GITLEAKS_JSON_EXISTS]false"
      [ -f "${{ parameters.sarifReportName }}" ] && echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]true" || echo "##vso[task.setvariable variable=GITLEAKS_SARIF_EXISTS]false"
    displayName: 'Run Gitleaks scan (JSON + SARIF, resilient)'
    continueOnError: true

  - task: PublishPipelineArtifact@1
    displayName: 'Publish artifact: gitleaks JSON'
    inputs:
      targetPath: '${{ parameters.jsonReportName }}'
      artifact: 'gitleaks-json'
      publishLocation: 'pipeline'
    condition: and(always(), eq(variables['GITLEAKS_JSON_EXISTS'], 'true'))

  - task: PublishPipelineArtifact@1
    displayName: 'Publish artifact: gitleaks SARIF'
    inputs:
      targetPath: '${{ parameters.sarifReportName }}'
      artifact: 'gitleaks-sarif'
      publishLocation: 'pipeline'
    condition: and(always(), eq(variables['GITLEAKS_SARIF_EXISTS'], 'true'))

  - script: |
      echo "Leaks=$(GITLEAKS_LEAKS), Branch=$(Build.SourceBranch)"
      if [ "$(GITLEAKS_LEAKS)" = "true" ] && [ "$(Build.SourceBranch)" = "refs/heads/main" ] && [ "${{ parameters.blockOnMainWhenLeaks }}" = "True" ]; then
        echo "Secrets detected and branch is main → failing the job."; exit 1
      else
        echo "Non-blocking (either no leaks, not on main, or gate disabled)."
      fi
    displayName: 'Policy gate: block only on main when leaks'

