# Template: DAST OWASP ZAP
# Description: Lance l'application en mode e2e et exécute un scan ZAP baseline
# Paramètres:
#   - backendDir: Répertoire du backend
#   - targetUrl: URL cible pour le scan (défaut: http://localhost:8080)
#   - runOnBranches: Liste des branches sur lesquelles exécuter (défaut: main)
#   - startupProfile: Profil Spring Boot pour démarrage (défaut: e2e)
#   - startupWaitSeconds: Délai d'attente pour le démarrage (défaut: 60)
#   - publishArtifacts: Publier les artefacts (défaut: true)

parameters:
  - name: backendDir
    type: string
    default: 'backend'
  - name: targetUrl
    type: string
    default: 'http://localhost:8080'
  - name: runOnBranches
    type: object
    default:
      - main
  - name: startupProfile
    type: string
    default: 'e2e'
  - name: startupWaitSeconds
    type: number
    default: 60
  - name: publishArtifacts
    type: boolean
    default: true

steps:

  - script: chmod +x mvnw
    displayName: 'Fix exec bit for mvnw'
    workingDirectory: ${{ parameters.backendDir }}

  - script: |
      ./mvnw -B -ntp -DskipTests=true spring-boot:run -Dspring-boot.run.profiles=${{ parameters.startupProfile }} &
      for i in {1..${{ parameters.startupWaitSeconds }}}; do
        if curl -fsS "${{ parameters.targetUrl }}/management/health" >/dev/null 2>&1; then
          echo "App is up"; break
        fi
        echo "Waiting app..."; sleep 2
      done
    workingDirectory: ${{ parameters.backendDir }}
    displayName: 'Start backend locally (${{ parameters.startupProfile }}) & wait health'

  - script: |
      set -e
      OUT_DIR="$(System.DefaultWorkingDirectory)/dast"
      mkdir -p "$OUT_DIR"
      TARGET_URL="${{ parameters.targetUrl }}"
      if [ -z "$TARGET_URL" ]; then
        echo "ERROR: targetUrl is empty. Define it."; exit 1
      fi
      docker run --rm -t --network="host" -u "$(id -u):$(id -g)" -v "$OUT_DIR:/zap/wrk" -w /zap/wrk owasp/zap2docker-stable zap-baseline.py -t "$TARGET_URL" -r zap_report.html || true
      if [ ! -f "$OUT_DIR/zap_report.html" ]; then
        echo "<html><body><h1>ZAP report missing</h1><p>No report generated. Check previous logs.</p></body></html>" > "$OUT_DIR/zap_report.html"
        echo "WARN: zap_report.html was not generated by ZAP; created a placeholder."
      fi
      if [ -f "$OUT_DIR/zap_report.html" ]; then
        echo "##vso[task.setvariable variable=ZAP_REPORT_EXISTS]true"
      else
        echo "##vso[task.setvariable variable=ZAP_REPORT_EXISTS]false"
      fi
    displayName: 'OWASP ZAP baseline scan (HTML report)'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish artifact: zap-report.html'
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/dast/zap_report.html'
      artifact: 'zap-report'
      publishLocation: 'pipeline'
    condition: and(always(), eq(variables['ZAP_REPORT_EXISTS'], 'true'), eq(${{ parameters.publishArtifacts }}, true))

