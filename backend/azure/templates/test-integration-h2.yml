# ---------------------------------------------------------------------------
# Template : Tests d'Intégration (H2 In-Memory)
# Objectif : Valider les interactions de bout-en-bout avec une base H2
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
  - name: mavenCacheFolder
    type: string
    default: $(Pipeline.Workspace)/.m2/repository

steps:
  - bash: |
      set -euo pipefail
      echo "--- Lancement des Tests d'Intégration (H2) ---"
      cd "${{ parameters.workingDir }}"

      # -Dsurefire.skip=true : On saute les tests unitaires (déjà faits)
      ./mvnw -B -ntp verify \
        -Dsurefire.skip=true \
        -Dspring.profiles.active=test \
        -Dmaven.repo.local=${{ parameters.mavenCacheFolder }}
    displayName: 'Run Integration Tests (H2)'

  - task: PublishTestResults@2
    displayName: 'Publish IT Results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/target/failsafe-reports/TEST-*.xml'
      searchFolder: '${{ parameters.workingDir }}'
      failTaskOnFailedTests: true
    condition: always()

  - publish: '${{ parameters.workingDir }}/target/site/jacoco-it'
    artifact: 'jacoco-it'
    displayName: 'Publish IT Coverage Artifact'
    condition: always()
    continueOnError: true
