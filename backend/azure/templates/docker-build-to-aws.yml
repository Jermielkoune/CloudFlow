# ---------------------------------------------------------------------------
# Template : Build & Containerization
# Objectif : Générer le binaire, builder l'image Docker
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
  - name: registryServer
    type: string
  - name: repository
    type: string
  - name: imageTag
    type: string
    default: '$(Build.BuildId)'

steps:
  - bash: |
      set -e
      echo "--- Auto-découverte de la région AWS ---"
      REGION=$(echo "${{ parameters.registryServer }}" | cut -d'.' -f4)
      echo "Région détectée: $REGION"
      echo "--- Authentification sur AWS ECR ---"
      aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin ${{ parameters.registryServer }}
    displayName: 'Smart Login to AWS ECR'
    env:
      AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
      AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)

  - bash: |
      set -e
      echo "--- Initialisation du moteur Docker Buildx ---"
      docker buildx create --use --driver docker-container

      echo "--- Lancement du Build avec Remote Caching ---"
      docker buildx build \
      --push \
      --secret id=TOKEN,env=TOKEN \
      --cache-from=type=registry,ref=${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache \
      --cache-to=type=registry,ref=${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache,mode=max \
      -t ${{ parameters.registryServer }}/${{ parameters.repository }}:${{ parameters.imageTag }} \
      -f ${{ parameters.workingDir }}/Dockerfile \
      ${{ parameters.workingDir }}
    displayName: 'Build & Push with BuildKit Remote Cache'
    env:
      TOKEN: $(SECRET_TOKEN)

  - bash: |
      docker logout ${{ parameters.registryServer }}
      displayName: 'Logout from AWS ECR'
      condition: always()
