# Template: Toolchain Setup (Checkout + Cache + JDK)
parameters:
  - name: workingDir
    type: string
  - name: jdkVersion
    type: string
    default: '17'
  - name: mavenCachePath
    type: string
    default: $(Pipeline.Workspace)/.m2/repository

steps:
  # ---------------------------------------------------------------------------
  # 1. Création silencieuse du dossier de cache
  # ---------------------------------------------------------------------------
  - bash: mkdir -p ${{ parameters.mavenCachePath }}
    displayName: 'Init Cache System'

  # ---------------------------------------------------------------------------
  # 2. Gestion du Cache Maven
  # ---------------------------------------------------------------------------
  - task: Cache@2
    inputs:
      key: 'maven | "$(Agent.OS)" | ${{ parameters.workingDir }}/pom.xml'
      restoreKeys: |
        maven | "$(Agent.OS)"
        maven
      path: ${{ parameters.mavenCachePath }}
    displayName: 'Mount Maven Cache'

  # ---------------------------------------------------------------------------
  # 3. Installation du JDK
  # ---------------------------------------------------------------------------
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '${{ parameters.jdkVersion }}'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: 'Setup JDK ${{ parameters.jdkVersion }}'

  # ---------------------------------------------------------------------------
  # 4. Préparation de l'environnement (Permissions & Path)
  # ---------------------------------------------------------------------------
  - bash: |
      set -euo pipefail
      echo "--- VÉRIFICATION DE LA TOOLCHAIN ---"

      echo "Configuration Maven :"
      echo "   Cache Path cible : ${{ parameters.mavenCachePath }}"
      echo "   Taille du cache  : $(du -sh ${{ parameters.mavenCachePath }} 2>/dev/null || echo 'Vide/Inexistant')"

      echo "Configuration Java :"
      echo "   Version demandée : ${{ parameters.jdkVersion }}"
      echo "   JAVA_HOME actuel : $JAVA_HOME"

      echo "Vérification du Wrapper :"
      if [ -f "${{ parameters.workingDir }}/mvnw" ]; then
        chmod +x ${{ parameters.workingDir }}/mvnw
        echo "   Wrapper 'mvnw' trouvé et rendu exécutable."
        echo "   Version du wrapper :"
        ${{ parameters.workingDir }}/mvnw -version | head -n 1
      else
        echo "   Wrapper 'mvnw' ABSENT dans ${{ parameters.workingDir }}."
        echo "   Utilisation de Maven global :"
        mvn -version | head -n 1
      fi

      echo "##vso[task.setvariable variable=MAVEN_OPTS]-Dmaven.repo.local=${{ parameters.mavenCachePath }}"
      echo "--- SETUP TERMINÉ ---"
    displayName: 'Finalize & Audit Environment'
