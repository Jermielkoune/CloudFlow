# Template: Toolchain Setup (Checkout + Cache + JDK)
parameters:
  - name: jdkVersion
    type: string
    default: '17'
  - name: backendDir
    type: string
    default: 'backend'
  - name: mavenCacheFolder
    type: string

steps:
  # ---------------------------------------------------------------------------
  # 1. Création explicite du dossier de cache
  # ---------------------------------------------------------------------------
  - bash: |
      echo "Création du dossier de cache local : ${{ parameters.mavenCacheFolder }}"
      mkdir -p ${{ parameters.mavenCacheFolder }}
    displayName: 'Init Maven Cache Folder'

  # ---------------------------------------------------------------------------
  # 2. Gestion du Cache Maven (Performance +50%)
  # ---------------------------------------------------------------------------
  - task: Cache@2
    displayName: 'Cache Maven packages'
    inputs:
      key: 'maven | "$(Agent.OS)" | $(Pipeline.Workspace)/${{ parameters.backendDir }}/pom.xml'
      restoreKeys: |
        maven | "$(Agent.OS)"
        maven
      path: ${{ parameters.mavenCacheFolder }}

  # ---------------------------------------------------------------------------
  # 3. Installation du JDK
  # ---------------------------------------------------------------------------
  - task: JavaToolInstaller@0
    displayName: 'Install JDK'
    inputs:
      versionSpec: '${{ parameters.jdkVersion }}'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  # ---------------------------------------------------------------------------
  # 4. Préparation de l'environnement (Permissions & Path)
  # ---------------------------------------------------------------------------
  - bash: |
      set -euo pipefail

      BACKEND_DIR="${{ parameters.backendDir }}"
      CACHE_PATH="${{ parameters.mavenCacheFolder }}"

      echo "--- Configuration de la Toolchain ---"
      echo "JAVA_HOME : $JAVA_HOME"
      echo "Cache Maven ciblé : $CACHE_PATH"

      echo "##vso[task.setvariable variable=MAVEN_OPTS]-Dmaven.repo.local=$CACHE_PATH"
      cd "$(Pipeline.Workspace)/$BACKEND_DIR"

      # Rendre le wrapper exécutable (critique pour Linux)
      if [ -f "mvnw" ]; then
        chmod +x mvnw
        echo "mvnw rendu exécutable."
        ./mvnw -version
      else
        echo "WARNING: pas de wrapper mvnw trouvé, fallback sur maven global"
        mvn -version
      fi
    displayName: 'Validate Environment & Wrapper'
