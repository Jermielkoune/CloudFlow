# Template: Toolchain Setup (Checkout + Cache + JDK)
parameters:
  - name: jdkVersion
    type: string
    default: '17'
  - name: backendDir
    type: string
    default: 'backend'
  - name: mavenCacheFolder
    type: string

steps:
  # ---------------------------------------------------------------------------
  # 1. Gestion du Cache Maven (Performance +50%)
  # ---------------------------------------------------------------------------
  - task: Cache@2
    displayName: 'Cache Maven packages'
    inputs:
      key: 'maven | "$(Agent.OS)" | $(Pipeline.Workspace)/${{ parameters.backendDir }}/pom.xml'
      restoreKeys: |
        maven | "$(Agent.OS)"
        maven
      path: ${{ parameters.mavenCacheFolder }}

  # ---------------------------------------------------------------------------
  # 3. Installation du JDK
  # ---------------------------------------------------------------------------
  - task: JavaToolInstaller@0
    displayName: 'Install JDK ${{ parameters.jdkVersion }}'
    inputs:
      versionSpec: '${{ parameters.jdkVersion }}'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  # ---------------------------------------------------------------------------
  # 4. Préparation de l'environnement (Permissions & Path)
  # ---------------------------------------------------------------------------
  - bash: |
      set -euo pipefail

      BACKEND_DIR="${{ parameters.backendDir }}"
      if [ -z "$BACKEND_DIR" ]; then
        BACKEND_DIR="backend"
      fi

      echo "--- Configuration pour : $BACKEND_DIR ---"
      echo "JAVA_HOME set to: $JAVA_HOME"

      # On va dans le dossier du projet client
      cd "$(Pipeline.Workspace)/$BACKEND_DIR"

      # Rendre le wrapper exécutable (critique pour Linux)
      if [ -f "mvnw" ]; then
        chmod +x mvnw
        echo "mvnw rendu exécutable."
        ./mvnw -version
      else
        echo "WARNING: pas de wrapper mvnw trouvé, fallback sur maven global"
        mvn -version
      fi
    displayName: 'Validate Environment & Wrapper'
