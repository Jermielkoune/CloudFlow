# ---------------------------------------------------------------------------
# Template : Build & Containerization
# Objectif : Générer le binaire, builder l'image Docker, et vérifier sa sécurité
# ---------------------------------------------------------------------------
parameters:
  - name: workingDir
    type: string
  - name: containerRegistry
    type: string
  - name: registryServer
    type: string
  - name: repository
    type: string
  - name: imageTag
    type: string
    default: '$(Build.BuildId)'

steps:
  - task: Docker@2
    displayName: 'Build Docker Image'
    inputs:
      command: 'build'
      containerRegistry: '${{ parameters.containerRegistry }}'
      repository: '${{ parameters.repository }}'
      dockerfile: '${{ parameters.workingDir }}/Dockerfile'
      buildContext: '${{ parameters.workingDir }}'
      tags: '${{ parameters.imageTag }}'
      arguments: >
        --secret id=TOKEN,env=TOKEN
        --cache-from=type=registry,ref=${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache
        --cache-to=type=registry,ref=${{ parameters.registryServer }}/${{ parameters.repository }}:buildcache,mode=max
    env:
      DOCKER_BUILDKIT: 1
      TOKEN: $(SECRET_TOKEN)

  - task: Docker@2
    displayName: 'Push Docker Image'
    inputs:
      command: 'push'
      containerRegistry: '${{ parameters.containerRegistry }}'
      repository: '${{ parameters.repository }}'
      tags: '${{ parameters.imageTag }}'
