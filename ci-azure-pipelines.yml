# Pipeline orchestrateur CI Backend - Version templateisée
name: $(Date:yyyyMMdd)$(Rev:.r)

parameters:
  - name: BrancheCible
    displayName: "Branche à utiliser"
    type: string
    default: 'refs/heads/main'
# -----------------------------------------------------------------------------
# Variables globales
# -----------------------------------------------------------------------------
variables:
  - name: BACKEND_DIR
    value: 'application-client'
  - name: MAVEN_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.m2/repository
  - name: vmImage
    value: 'ubuntu-latest'

# -----------------------------------------------------------------------------
# Pool
# -----------------------------------------------------------------------------
pool:
  vmImage: '$(vmImage)'

# -----------------------------------------------------------------------------
# Déclencheurs
# -----------------------------------------------------------------------------
trigger: none
pr: none

resources:
  repositories:
    - repository: Sikaseal
      endpoint: Jermielkoune-github-connexion-auth
      trigger:
        branches:
          include: [ main, feature/*, bugfix/*, releases/* ]
          exclude: [ release/old* ]
        paths:
          include: [ src/, pom.xml ]
          exclude: [ README.md, .gitignore ]
      pr:
        drafts: false
        branches:
          include: [ main, releases/*]
          exclude: [ release/old* ]
        paths:
          include: [ src/, pom.xml ]
          exclude: [ README.md, .gitignore ]
      name: Jermielkoune/sikaseal
      ref: ${{ parameters.BrancheCible }}
      type: github


# -----------------------------------------------------------------------------
# Stages
# -----------------------------------------------------------------------------
stages:
  # ---------------------------------------------------------------------------
  # Stage 1 – Toolchain Java uniquement
  # ---------------------------------------------------------------------------
  - stage: setup_toolchain
    displayName: 'Smart Detect & Setup'
    jobs:
      - job: prepare_env
        displayName: 'Prepare Environment'
        steps:
          - checkout: self
            displayName: 'Checkout CloudFlow Logic'

          - checkout: Sikaseal
            path: $(BACKEND_DIR)
            clean: true
            fetchTags: false
            displayName: 'Checkout code client'
          - bash: |
              set -euo pipefail
              PROJECT_PATH="$(Pipeline.Workspace)/$(BACKEND_DIR)"
              if [ -f "$PROJECT_PATH/pom.xml" ]; then
                VERSION_JAVA=$(grep -oPm1 '(?<=<java.version>)[^<]+' "$PROJECT_PATH/pom.xml" || echo "17")
                echo "Version Java détectée: $VERSION_JAVA" 
              else
                echo "Pas de pom.xml trouvé, fallback sur Java 17"
                VERSION_JAVA="17"
              fi
              echo "##vso[task.setvariable variable=JDK_VERSION]$VERSION_JAVA"
            displayName: 'Détection version Java'

          - template: backend/azure/templates/toolchain.yml
            parameters:
              jdkVersion: '$(JDK_VERSION)'
              backendDir: '$(BACKEND_DIR)'
              mavenCacheFolder: '$(MAVEN_CACHE_FOLDER)'
