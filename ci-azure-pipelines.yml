#           parameters:
#             workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
#             registryServer: '$(AWS_ECR_SERVER_URL)'
#             repository: '$(ACR_REPOSITORY_NAME)'
#             imageTag: '$(Build.SourceBranchName)-$(Build.BuildId)'