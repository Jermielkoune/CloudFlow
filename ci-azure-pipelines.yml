# Pipeline orchestrateur CI Backend - Version templateisée
name: $(Date:yyyyMMdd)$(Rev:.r)

# -----------------------------------------------------------------------------
# Déclencheurs
# -----------------------------------------------------------------------------
trigger: none
pr: none

resources:
  repositories:
    - repository: Sikaseal
      endpoint: Jermielkoune-github-connexion-auth
      name: Jermielkoune/sikaseal
      type: github
      trigger:
        branches:
          include: [ main, develop]
          exclude: [ release/old* ]
        paths:
          include: [ src/, pom.xml ]
          exclude: [ README.md, .gitignore ]
      # NB : Pour déclencher le pipeline cloudflow lors d'une PR sur le repo client externe, on doit aller dans
      # l'interface de GitHub (ou Azure Repos) du projet Sikaseal et configurer une Branch Policy (Politique de branche)
      # qui exige le succès de notre pipeline CloudFlow

# -----------------------------------------------------------------------------
# Variables globales
# -----------------------------------------------------------------------------
variables:
  - group: cloudflow-global-config
  - name: REPO_NOM
    value: $[ resources.repositories.Sikaseal.name ]
  - name: REPO_BRANCHE
    value: $[ resources.repositories.Sikaseal.ref ]
  - name: CODE_SOURCE_DIR
    value: $[ resources.repositories.Sikaseal.name ]
  - name: MAVEN_CACHE_FOLDER
    value: $(Pipeline.Workspace)/.m2/repository

# -----------------------------------------------------------------------------
# Pool
# -----------------------------------------------------------------------------
pool:
  vmImage: 'ubuntu-latest'

# -----------------------------------------------------------------------------
# Stages
# -----------------------------------------------------------------------------
stages:
  # ---------------------------------------------------------------------------
  # Stage 1 – Toolchain Java
  # ---------------------------------------------------------------------------
  - stage: Setup
    displayName: 'Smart Setup'
    jobs:
      - job: Toolchain
        steps:
          - bash: |
              echo "=================================================================="
              echo "DÉMARRAGE DU PIPELINE CLOUDFLOW"
              echo "=================================================================="
              echo "Build ID       : $(Build.BuildId)"
              echo "Lancé par      : $(Build.RequestedFor)"
              echo "Branche        : $(Build.SourceBranchName)"
              echo "Commit         : $(Build.SourceVersion)"
              echo "Agent OS       : $(Agent.OS)"
              echo "Dossier Travail: $(System.DefaultWorkingDirectory)"
              echo "=================================================================="
            displayName: 'Display Build Context'

          - checkout: self
            displayName: 'Load Templates'

          - checkout: Sikaseal
            path: s/$(CODE_SOURCE_DIR)
            clean: true
            fetchTags: false

          # Dans la vision finale, ceci sera remplacé par l'injection de variable par l'App Analyzer
          - bash: |
              set -euo pipefail
              echo "Dépôt détecté : $(REPO_NOM)"
              echo "Branche source : $(REPO_BRANCHE)"

              POM_PATH="$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)/pom.xml"
              DEFAULT_VERSION="17"
              FINAL_VERSION="$DEFAULT_VERSION"

              extract_prop() {
                local prop="$1"
                if [ ! -f "$POM_PATH" ]; then
                  return 0
                fi
                sed -n "s@.*<${prop}>\\([^<]*\\)</${prop}>.*@\\1@p" "$POM_PATH" | head -n 1 | tr -d '[:space:]'
              }

              if [ -f "$POM_PATH" ]; then
                echo "POM détecté : $POM_PATH"

                DETECTED_RELEASE="$(extract_prop "maven.compiler.release" || true)"
                DETECTED_JAVA_VERSION="$(extract_prop "java.version" || true)"
                DETECTED_TARGET="$(extract_prop "maven.compiler.target" || true)"
                DETECTED_SOURCE="$(extract_prop "maven.compiler.source" || true)"

                # Priorité : release > java.version > target > source > défaut
                if [ -n "$DETECTED_RELEASE" ]; then
                  FINAL_VERSION="$DETECTED_RELEASE"
                  echo "Java détecté via <maven.compiler.release> = $FINAL_VERSION"
                elif [ -n "$DETECTED_JAVA_VERSION" ]; then
                  FINAL_VERSION="$DETECTED_JAVA_VERSION"
                  echo "Java détecté via <java.version> = $FINAL_VERSION"
                elif [ -n "$DETECTED_TARGET" ]; then
                  FINAL_VERSION="$DETECTED_TARGET"
                  echo "Java détecté via <maven.compiler.target> = $FINAL_VERSION"
                elif [ -n "$DETECTED_SOURCE" ]; then
                  FINAL_VERSION="$DETECTED_SOURCE"
                  echo "Java détecté via <maven.compiler.source> = $FINAL_VERSION"
                else
                  echo "Aucune propriété Java trouvée dans le POM, valeur par défaut = $FINAL_VERSION"
                fi
              else
                echo "POM introuvable ($POM_PATH), valeur par défaut = $FINAL_VERSION"
              fi

              echo "Version Java retenue: $FINAL_VERSION"
              echo "##vso[task.setvariable variable=DETECTED_JDK]$FINAL_VERSION"
              echo "##vso[task.setvariable variable=DETECTED_JDK;isOutput=true]$FINAL_VERSION"
            name: JavaDetector
            displayName: 'Auto-detect Java Version'

          - template: templates/toolchain.yml
            parameters:
              jdkVersion: '$(DETECTED_JDK)'
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
  # ---------------------------------------------------------------------------
  # Stage 2 – Code Quality (STATIC Analysis)
  # ---------------------------------------------------------------------------
  - stage: Code_Quality
    displayName: 'Code Quality & Security'
    dependsOn: Setup
    variables:
      DETECTED_JDK: $[ stageDependencies.Setup.Toolchain.outputs['JavaDetector.DETECTED_JDK'] ]
    jobs:
      - job: Static_Analysis
        displayName: 'Static Analysis'
        steps:
          - checkout: self
          - checkout: Sikaseal
            path: s/$(CODE_SOURCE_DIR)

          - template: templates/toolchain.yml
            parameters:
              jdkVersion: '$(DETECTED_JDK)'
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'

          - template: templates/quality-check.yml
            parameters:
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
              mavenCacheFolder: '$(MAVEN_CACHE_FOLDER)'

          - template: templates/security-sast.yml
            parameters:
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
              severity: 'CRITICAL,HIGH'
              githubToken: '$(GITHUB_TOKEN)'

  # ---------------------------------------------------------------------------
  # Stage 3 – Tests Unitaires (Rapide)
  # ---------------------------------------------------------------------------
  - stage: Unit_Tests
    displayName: 'Unit Tests'
    dependsOn:
      - Code_Quality
      - Setup
    variables:
      DETECTED_JDK: $[ stageDependencies.Setup.Toolchain.outputs['JavaDetector.DETECTED_JDK'] ]
    jobs:
      - job: JUnit_IT
        displayName: 'Run Junit 6 and Integration Tests'
        steps:
          - checkout: self
          - checkout: Sikaseal
            path: s/$(CODE_SOURCE_DIR)

          - template: templates/toolchain.yml
            parameters:
              jdkVersion: '$(DETECTED_JDK)'
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'

          - template: templates/test-unit.yml
            parameters:
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
              mavenCacheFolder: '$(MAVEN_CACHE_FOLDER)'

          - template: templates/test-integration-h2.yml
            parameters:
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
              mavenCacheFolder: '$(MAVEN_CACHE_FOLDER)'

  # ---------------------------------------------------------------------------
  # Stage 4 – Code Inspection (SonarQube)
  # ---------------------------------------------------------------------------
  - stage: Code_Inspection
    displayName: 'Sonar Inspection'
    dependsOn:
      - Unit_Tests
      - Setup
    variables:
      DETECTED_JDK: $[ stageDependencies.Setup.Toolchain.outputs['JavaDetector.DETECTED_JDK'] ]
    jobs:
      - job: SonarScan
        displayName: 'Run SonarQube Analysis'
        steps:
          - checkout: self
          - checkout: Sikaseal
            path: s/$(CODE_SOURCE_DIR)
            fetchDepth: 0

          - template: templates/toolchain.yml
            parameters:
              jdkVersion: '$(DETECTED_JDK)'
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download JaCoCo Report'
            inputs:
              artifact: 'jacoco-ut'
              targetPath: '$(Pipeline.Workspace)/jacoco-ut'

          - template: templates/sonar-scan.yml
            parameters:
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
              jacocoReportPath: '$(Pipeline.Workspace)/jacoco-ut/jacoco.xml'
              sonarProjectKey: '$(SONAR_PROJECT_KEY)'
              sonarOrganization: '$(SONAR_ORG)'
              sonarHostUrl: '$(SONAR_HOST_URL)'

  # ---------------------------------------------------------------------------
  # Stage 5 – Containerization (Docker Build & Trivy Image Scan)
  # ---------------------------------------------------------------------------
  - stage: Containerization
    displayName: 'Containerization & Image Security'
    dependsOn:
      - Code_Inspection
    variables:
      DETECTED_JDK: $[ stageDependencies.Setup.Toolchain.outputs['JavaDetector.DETECTED_JDK'] ]
    jobs:
      - job: DockerBuild
        displayName: 'Build Layered JAR & Docker Image'
        steps:
          - checkout: self
          - checkout: Sikaseal
            path: s/$(CODE_SOURCE_DIR)

          - template: templates/docker-build-to-azure.yml
            parameters:
              workingDir: '$(Build.SourcesDirectory)/$(CODE_SOURCE_DIR)'
              containerRegistry: '$(ACR_CONNECTION_NAME)'
              registryServer: '$(ACR_SERVER_URL)'
              registryUsername: '$(ACR_USERNAME)'
              registryPassword: '$(ACR_PASSWORD)'
              repository: '$(ACR_REPOSITORY_NAME)'
              imageTag: '$(Build.SourceBranchName)-$(Build.BuildId)'

